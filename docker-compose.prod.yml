services:
  tnt-agency-front:
    image: "${APP_IMAGE:?APP_IMAGE requis}"
    container_name: tnt-agency-front
    pull_policy: always
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 40s
    logging: { driver: "json-file", options: { max-size: "50m", max-file: "5" } }
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tnt-agency-front.rule=Host(`tiibntick-agency.yowyob.com`)"
      - "traefik.http.routers.tnt-agency-front.entrypoints=websecure"
      - "traefik.http.routers.tnt-agency-front.tls=true"
      - "traefik.http.routers.tnt-agency-front.tls.certresolver=letsencrypt"
      - "traefik.http.routers.tnt-agency-front.priority=10"
      - "traefik.http.services.tnt-agency-front.loadbalancer.server.port=3000"
      - "traefik.docker.network=yowyob"
    networks: [yowyob]
networks:
  yowyob: { external: true, name: yowyob }
